<div class="category-form">
  <h2 class="text-xl font-bold">{{ isEdit() ? 'Edit Category' : 'Add New Category' }}</h2>

  <form #form="ngForm" (ngSubmit)="onSubmit()">
    <mat-form-field class="full-width">
      <mat-label>Category Name</mat-label>
      <input placeholder="name" matInput [ngModel]="name()" (ngModelChange)="name.set($event)" name="name" required
        [disabled]="submitting()" />
      @if (form.submitted && !name()) {
      <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <div class="actions">
      <button type="button" matButton="outlined" (click)="onCancel()" [disabled]="submitting()">
        Cancel
      </button>
      <button type="submit" matButton="outlined" color="primary" [disabled]="!name().trim() || submitting()">
        {{ submitting() ? (isEdit() ? 'Updating...' : 'Adding...') : (isEdit() ? 'Update' : 'Add') }}
      </button>
    </div>
  </form>
</div>
