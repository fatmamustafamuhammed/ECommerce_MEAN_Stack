<div class="px-10 mt-5">
  <div class="flex justify-between mb-2">
    <h1 class="text-xl font-bold">Manage Categories</h1>
    <button type="button" mat-raised-button style="background-color: white-smoke; color: rgb(71, 153, 114);"
      routerLink="/admin/categories/add">
      Add New Category
    </button>
  </div>
  <div class="shadow">
    <mat-form-field class="w-full mb-4">
      <mat-label>Filter</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Search for all Columns..." #input>
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)"
      class="mat-elevation-z8 w-full border-collapse border border-gray-300">

      <!-- id Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"
          class="border border-gray-300 px-4 py-2 font-medium text-left bg-gray-100">
          ID
        </th>
        <td mat-cell *matCellDef="let element" class="border border-gray-300 px-4 py-2">
          {{element._id}}
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by name"
          class="border border-gray-300 px-4 py-2 font-medium text-left bg-gray-100">
          Name
        </th>
        <td mat-cell *matCellDef="let element" class="border border-gray-300 px-4 py-2">
          {{element.name}}
        </td>
      </ng-container>

      <!-- Action Column with stroked buttons -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef
          class="border border-gray-300 px-4 py-2 font-medium text-left bg-gray-100">
          Actions
        </th>
        <td mat-cell *matCellDef="let element" class="border border-gray-300 px-4 py-2">
          <div class="flex gap-2 items-center">
            <button type="button" mat-raised-button style="background-color: white-smoke; color: rgb(81, 136, 178);">
              Edit
            </button>
            <button type="button" mat-raised-button style="background-color: white-smoke; color: rgb(197, 97, 97);">
              Delete
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns" class="bg-gray-100"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-gray-50"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell border border-gray-300 px-4 py-2 text-center" [attr.colspan]="displayedColumns.length">
          No data matching the filter "{{input.value}}"
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons
      aria-label="Select page of periodic elements" class="mt-">
    </mat-paginator>
  </div>
</div>
