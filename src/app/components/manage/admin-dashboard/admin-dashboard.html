<div class="admin-dashboard">
  <div class="container">
    <h1 class="dashboard-title">Admin Dashboard</h1>

    <div class="buttons-container">
      <!-- Categories Button -->
      <button matButton="outlined" color="primary" (click)="goToCategories()">
        <mat-icon>category</mat-icon>
        Manage Categories
      </button>

      <!-- Brands Button -->
      <button matButton="outlined" color="accent" (click)="goToBrands()">
        <mat-icon>branding_watermark</mat-icon>
        Manage Brands
      </button>

      <!-- Products Button -->
      <button matButton="outlined" color="warn" (click)="goToProducts()">
        <mat-icon>inventory_2</mat-icon>
        Manage Products
      </button>
    </div>
  </div>
</div>
