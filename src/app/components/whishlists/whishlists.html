<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-8">My Wishlist</h1>

  <!-- Loading State -->
  @if (wishListService.loading$()) {
  <div class="flex justify-center items-center h-64">
    <div class="text-center">
      <div class="text-4xl mb-4">🔄</div>
      <div class="text-gray-500">Loading wishlist...</div>
    </div>
  </div>
  }
  <!-- Empty State -->
  @else if (wishlistItems().length === 0) {
  <div class="text-center py-12">
    <div class="text-6xl mb-4">❤️</div>
    <h2 class="text-2xl font-semibold text-gray-700 mb-2">Your wishlist is empty</h2>
    <p class="text-gray-500 mb-6">Start adding products you love!</p>
    <button class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
      [routerLink]="['/products']">
      Browse Products
    </button>
  </div>
  }
  <!-- Products Grid -->
  @else {
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    @for (item of wishlistItems(); track item._id) {
    <app-product-card [product]="item" (addToCart)="handleAddToCart($event)">
    </app-product-card>
    }
  </div>
  }
</div>
